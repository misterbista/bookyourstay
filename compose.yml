name: bookyourstay

x-dev-base: &dev-base
  build:
    context: .
    dockerfile: infra/docker/dev/Dockerfile
    args:
      USER_UID: ${LOCAL_UID:-1000}
      USER_GID: ${LOCAL_GID:-1000}
  working_dir: /workspace
  stdin_open: true
  tty: true
  environment:
    ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
    ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bookyourstay};Username=${POSTGRES_USER:-bookyourstay};Password=${POSTGRES_PASSWORD:-bookyourstay}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_BUCKET: ${MINIO_BUCKET:-bookyourstay}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  volumes:
    - .:/workspace
    - bun_cache:/home/dev/.bun/install/cache
    - nuget_cache:/home/dev/.nuget/packages

services:
  dev-env:
    <<: *dev-base
    container_name: bookyourstay-dev-env
    command: ["sleep", "infinity"]

  backend-dev:
    <<: *dev-base
    command: ["dotnet", "watch", "--project", "apps/backend", "run", "--urls", "http://0.0.0.0:8080"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend-dev:
    <<: *dev-base
    command: ["bun", "run", "--filter", "frontend", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  postgres:
    image: postgres:16-alpine
    container_name: bookyourstay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookyourstay}
      POSTGRES_USER: ${POSTGRES_USER:-bookyourstay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookyourstay}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookyourstay} -d ${POSTGRES_DB:-bookyourstay}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: bookyourstay-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: bookyourstay-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-bookyourstay} &&
      mc anonymous set private local/${MINIO_BUCKET:-bookyourstay}
      "
    restart: "no"

  # app:
  #   profiles: ["app"]
  #   build:
  #     context: .
  #   container_name: bookyourstay-app
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #     minio-init:
  #       condition: service_completed_successfully
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
  #     ASPNETCORE_URLS: http://+:8080
  #     ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-bookyourstay};Username=${POSTGRES_USER:-bookyourstay};Password=${POSTGRES_PASSWORD:-bookyourstay}
  #     Storage__Provider: Minio
  #     Storage__Endpoint: minio:9000
  #     Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
