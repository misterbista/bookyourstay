  #     Storage__Bucket: ${MINIO_BUCKET:-bookyourstay}
  #     Storage__UseSsl: "false"
  #   ports:
  #     - "${APP_PORT:-8080}:8080"

volumes:
  bun_cache:
  minio_data:
  nuget_cache:
